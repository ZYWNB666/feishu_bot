---
# =============================================
# Namespace
# =============================================
apiVersion: v1
kind: Namespace
metadata:
  name: feishu-bot

---
# =============================================
# Secret: 所有敏感配置
# =============================================
apiVersion: v1
kind: Secret
metadata:
  name: feishu-bot-secret
  namespace: feishu-bot
type: Opaque
stringData:
  # Feishu App
  APP_ID: "*"
  APP_SECRET: "*"
  LARK_HOST: "https://open.feishu.cn"
  VERIFICATION_TOKEN: ""
  ENCRYPT_KEY: ""
  # Grafana
  GRAFANA_API_KEY: "*"
  # MySQL (外部实例)
  MYSQL_HOST: "10.251.93.216"
  MYSQL_PORT: "3306"
  MYSQL_USER: "root"
  MYSQL_PASSWORD: "*"
  MYSQL_DATABASE: "alert_db"
  MYSQL_CHARSET: "utf8mb4"
  # Flashcat
  FLASHCAT_SCHEDULE_ID: "*"
  FLASHCAT_APP_KEY: "*"
  FLASHCAT_PHONE_INTEGRATION_KEY: "*"
  FLASHCAT_CHANNEL_ID: "*"
  # App
  HOST: "0.0.0.0"
  PORT: "3100"
  DEBUG: "false"
  LOG_LEVEL: "DEBUG"

---
# =============================================
# Deployment: feishu-bot
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feishu-bot
  namespace: feishu-bot
  labels:
    app: feishu-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feishu-bot
  template:
    metadata:
      labels:
        app: feishu-bot
    spec:
      containers:
        - name: feishu-bot
          image: harbor.magikcloud.cn/public/feishu_bot:v0.3
          ports:
            - containerPort: 3100
          envFrom:
            - secretRef:
                name: feishu-bot-secret
          readinessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        node-role.kubernetes.io/control-plane: ''
---
# =============================================
# Service: feishu-bot (NodePort)
# =============================================
apiVersion: v1
kind: Service
metadata:
  name: feishu-bot
  namespace: feishu-bot
spec:
  type: ClusterIP
  selector:
    app: feishu-bot
  ports:
    - port: 3100
      targetPort: 3100
